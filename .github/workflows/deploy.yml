name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
      - 'routes.json'
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm ci --if-present

      - name: Verify wrangler config
        run: |
          if [ -f "wrangler.toml" ]; then
            echo "✓ wrangler.toml found"
          else
            echo "✗ wrangler.toml missing"
            exit 1
          fi

      - name: Check TypeScript
        run: npm run type-check 2>/dev/null || echo "No type-check script"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: production
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Deployment successful
        if: success()
        run: |
          echo "✓ Deployment successful!"
          echo "Worker deployed to Cloudflare"

      - name: Deployment failed
        if: failure()
        run: |
          echo "✗ Deployment failed"
          echo "Check GitHub Actions logs for details"
          exit 1

      - name: Comment PR on success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Cloudflare Worker Deployed**\n\n🔗 [View in Dashboard](https://dash.cloudflare.com/)\n\n**Environment:** Production\n**Branch:** ${context.payload.pull_request.head.ref}`
            })

      - name: Comment PR on failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Cloudflare Worker Deployment Failed**\n\nCheck [Actions](https://github.com/${{ github.repository }}/actions) for error details.`
            })
