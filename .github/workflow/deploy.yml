name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code quality
        run: |
          npm run lint 2>/dev/null || echo "No lint script"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: production
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Comment PR with deployment info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Cloudflare Worker Preview Deployed**\n\n🔗 [View Worker](https://dash.cloudflare.com/)\n\n**Environment:** Production\n**Branch:** ${context.payload.pull_request.head.ref}`
            })

      - name: Create deployment status
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              description: 'Cloudflare Worker deployed',
              environment_url: 'https://dash.cloudflare.com/'
            })

      - name: Deployment failed
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Cloudflare Worker Deployment Failed**\n\nCheck [Actions](https://github.com/${{ github.repository }}/actions) for details.`
            })
